<!DOCTYPE html>
<html>
<head>
<style>
  body { background: #222; padding: 60px; }
  .box {
    width: 60px; height: 60px;
    background: red;
    border-radius: 10px;
    animation: bounce 1s infinite;
  }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-40px); }
  }
</style>
</head>
<body>
  <div class="box"></div>
</body>
</html>
